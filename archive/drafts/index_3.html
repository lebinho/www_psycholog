<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mgr Katarzyna Kryńska — Psycholog</title>
    <meta name="description"
        content="Psycholog mgr Katarzyna Kryńska — wsparcie psychologiczne stacjonarnie (Straszyn) oraz online." />

    <!-- Tailwind (Play CDN — tylko do podglądu) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React + Babel (standalone, tylko do podglądu) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.3.1",
            "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
            "lucide-react": "https://esm.sh/lucide-react@0.460.0?external=react"
        }
    }
    </script>

    <style>
        html { scroll-behavior: smooth; }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import {
            Moon, Sun, Calendar, MapPin, Quote, ArrowRight, HeartHandshake,
            Brain, Shield, UserCircle, CheckCircle2
        } from 'lucide-react';

        export default function App() {
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [isScrolled, setIsScrolled] = useState(false);

            const bookingUrl = "https://www.znanylekarz.pl/katarzyna-krynska/psycholog/straszyn";

            // Obsługa scrolla dla paska nawigacji
            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 20);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className={`min-h-screen transition-colors duration-700 font-sans ${isDarkMode ? 'bg-stone-900 text-stone-100' : 'bg-stone-50 text-stone-900'}`}>

                    {/* Pasek Nawigacji */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${isScrolled ? (isDarkMode ? 'bg-stone-900/90 backdrop-blur-md shadow-sm' : 'bg-white/90 backdrop-blur-md shadow-sm') : 'bg-transparent py-4'}`}>
                        <div className="max-w-7xl mx-auto px-6 lg:px-8">
                            <div className="flex justify-between items-center h-16">
                                <div className="flex flex-col">
                                    <span className="text-xl font-medium tracking-wide">mgr Katarzyna Kryńska</span>
                                    <span className={`text-sm ${isDarkMode ? 'text-stone-400' : 'text-stone-500'}`}>Psycholog</span>
                                </div>

                                <div className="flex items-center space-x-6">
                                    <button
                                        onClick={() => setIsDarkMode(!isDarkMode)}
                                        className={`p-2 rounded-full transition-colors ${isDarkMode ? 'hover:bg-stone-800 text-stone-300' : 'hover:bg-stone-200 text-stone-600'}`}
                                        aria-label="Przełącz tryb ciemny/jasny"
                                    >
                                        {isDarkMode ? <Sun size={20} /> : <Moon size={20} />}
                                    </button>
                                    <a
                                        href={bookingUrl}
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className={`hidden md:flex items-center px-5 py-2.5 rounded-full font-medium transition-transform hover:scale-105 active:scale-95 ${isDarkMode ? 'bg-stone-100 text-stone-900 hover:bg-white' : 'bg-stone-900 text-stone-50 hover:bg-black'}`}
                                    >
                                        <Calendar size={18} className="mr-2" />
                                        Umów wizytę
                                    </a>
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* Sekcja Hero (Powitalna) */}
                    <section className="relative pt-28 pb-16 lg:pt-32 lg:pb-20 overflow-hidden flex items-center">
                        <div className="max-w-7xl mx-auto px-6 lg:px-8 relative z-10 w-full">
                            <div className="grid lg:grid-cols-2 gap-12 lg:gap-12 items-center">

                                {/* Lewa kolumna: Tekst i przyciski */}
                                <div className="max-w-2xl relative z-20">
                                    <div className={`inline-flex items-center px-4 py-2 rounded-full text-sm font-medium mb-8 border ${isDarkMode ? 'bg-stone-800 border-stone-700 text-stone-300' : 'bg-white border-stone-200 text-stone-600'}`}>
                                        <span className="flex w-2 h-2 rounded-full bg-green-500 mr-2 animate-pulse"></span>
                                        Przyjmuję stacjonarnie (Straszyn) oraz Online
                                    </div>

                                    <h1 className="text-4xl lg:text-6xl font-light leading-tight mb-6">
                                        Przestrzeń, w której możesz <span className="font-medium italic">odetchnąć</span><br />i zrozumieć siebie.
                                    </h1>
                                    <p className={`text-lg lg:text-xl mb-10 leading-relaxed ${isDarkMode ? 'text-stone-400' : 'text-stone-600'}`}>
                                        Jako psycholog towarzyszę Ci w odkrywaniu wewnętrznej siły. W bezpiecznej, nieoceniającej atmosferze wspólnie odnajdziemy drogę do równowagi — bazując na Twoich własnych zasobach.
                                    </p>

                                    <div className="flex flex-col sm:flex-row space-y-4 sm:space-y-0 sm:space-x-4">
                                        <a
                                            href={bookingUrl}
                                            target="_blank"
                                            rel="noopener noreferrer"
                                            className={`flex items-center justify-center px-8 py-4 rounded-full font-medium text-lg transition-all hover:scale-105 active:scale-95 ${isDarkMode ? 'bg-stone-100 text-stone-900 hover:bg-white shadow-[0_0_20px_rgba(255,255,255,0.1)]' : 'bg-stone-900 text-stone-50 hover:bg-black shadow-[0_0_20px_rgba(0,0,0,0.1)]'}`}
                                        >
                                            Umów wizytę przez ZnanyLekarz

                                        </a>
                                    </div>

                                    <div className={`mt-8 flex items-center space-x-4 text-sm font-medium ${isDarkMode ? 'text-stone-400' : 'text-stone-500'}`}>
                                        <div className="flex -space-x-2">
                                            <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center transition-colors duration-700 ${isDarkMode ? 'border-stone-900 bg-stone-700' : 'border-stone-50 bg-stone-200'}`}><UserCircle size={20} className="opacity-50" /></div>
                                            <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center transition-colors duration-700 ${isDarkMode ? 'border-stone-900 bg-stone-600' : 'border-stone-50 bg-stone-300'}`}><UserCircle size={20} className="opacity-50" /></div>
                                            <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center transition-colors duration-700 ${isDarkMode ? 'border-stone-900 bg-stone-800' : 'border-stone-50 bg-stone-800 text-white'}`}><span className="text-xs">+10</span></div>
                                        </div>
                                        <span>Polecana przez pacjentów na ZnanyLekarz</span>
                                    </div>
                                </div>

                                {/* Prawa kolumna: Przestrzeń na zdjęcie */}
                                <div className="relative hidden lg:flex justify-center items-center">
                                    <div className={`absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[450px] h-[450px] rounded-full blur-3xl opacity-30 transition-colors duration-700 ${isDarkMode ? 'bg-stone-600' : 'bg-stone-300'}`}></div>

                                    <div className={`relative z-10 w-[350px] h-[350px] lg:w-[420px] lg:h-[420px] mx-auto rounded-full overflow-hidden transition-all duration-700 ${isDarkMode ? 'shadow-[0_0_100px_rgba(255,255,255,0.08)]' : 'shadow-[0_0_80px_rgba(0,0,0,0.15)]'}`}>
                                        <img
                                            src="https://s3-eu-west-1.amazonaws.com/znanylekarz.pl/doctor/f8640e/f8640ed139258445da7f6a1327da4029_large.jpg"
                                            alt="mgr Katarzyna Kryńska - Psycholog"
                                            className="w-full h-full object-cover scale-[1.10] grayscale hover:grayscale-0 transition-all duration-700"
                                        />
                                    </div>

                                    <div className={`absolute -bottom-4 left-0 p-5 rounded-3xl shadow-2xl max-w-[260px] z-20 transition-colors duration-700 ${isDarkMode ? 'bg-stone-800 shadow-black/50' : 'bg-white shadow-stone-300/50'}`}>
                                        <div className="flex text-amber-400 mb-2">
                                            {"★★★★★".split('').map((star, i) => <span key={i}>{star}</span>)}
                                        </div>
                                        <p className={`text-sm italic font-medium ${isDarkMode ? 'text-stone-300' : 'text-stone-700'}`}>
                                            "Atmosfera, w której człowiek czuje się w 100% bezpiecznie."
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Sekcja Moje Podejście */}
                    <section className={`py-16 lg:py-24 transition-colors duration-700 ${isDarkMode ? 'bg-stone-800/50' : 'bg-white'}`}>
                        <div className="max-w-7xl mx-auto px-6 lg:px-8">
                            <div className="grid md:grid-cols-2 gap-16 items-start">
                                <div>
                                    <h2 className="text-3xl font-light mb-6">To Ty jesteś ekspertem od swojego życia.</h2>
                                    <p className={`mb-6 leading-relaxed transition-colors duration-700 ${isDarkMode ? 'text-stone-400' : 'text-stone-600'}`}>
                                        W mojej pracy opieram się na założeniu, że to Ty jesteś ekspertem od swojego życia. Moim zadaniem nie jest dawanie gotowych rad, ale towarzyszenie Ci w procesie odkrywania Twoich własnych zasobów, mocnych stron i rozwiązań, które już w Tobie drzemią.
                                    </p>
                                    <p className={`leading-relaxed transition-colors duration-700 ${isDarkMode ? 'text-stone-400' : 'text-stone-600'}`}>
                                        Podczas sesji tworzę bezpieczną przestrzeń, wolną od oceny. Uważnie słucham, pomagając Ci spojrzeć na Twoje wyzwania z nowej perspektywy. Wspólnie określimy, co chcesz osiągnąć i krok po kroku będziemy dążyć do pożądanej zmiany.
                                    </p>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                    {[
                                        { icon: HeartHandshake, title: "Pełna akceptacja", desc: "Przestrzeń wolna od oceniania." },
                                        { icon: Brain, title: "Zasoby klienta", desc: "Skupiamy się na Twoich mocnych stronach." },
                                        { icon: Shield, title: "Bezpieczeństwo", desc: "Dyskrecja i komfort emocjonalny." },
                                        { icon: UserCircle, title: "Współpraca", desc: "Razem szukamy najlepszej drogi." }
                                    ].map((item, idx) => (
                                        <div key={idx} className={`p-6 rounded-2xl transition-colors duration-700 ${isDarkMode ? 'bg-stone-800' : 'bg-stone-50'}`}>
                                            <item.icon className={`mb-4 transition-colors duration-700 ${isDarkMode ? 'text-stone-300' : 'text-stone-700'}`} size={32} strokeWidth={1.5} />
                                            <h3 className="font-medium mb-2">{item.title}</h3>
                                            <p className={`text-sm transition-colors duration-700 ${isDarkMode ? 'text-stone-400' : 'text-stone-600'}`}>{item.desc}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Sekcja Zakres Pomocy */}
                    <section className="py-16 lg:py-24">
                        <div className="max-w-7xl mx-auto px-6 lg:px-8">
                            <div className="text-center max-w-3xl mx-auto mb-12">
                                <h2 className="text-3xl font-light mb-6">W czym mogę Ci pomóc?</h2>
                                <p className={`text-lg transition-colors duration-700 ${isDarkMode ? 'text-stone-400' : 'text-stone-600'}`}>
                                    Świadczę kompleksową pomoc psychologiczną dostosowaną do indywidualnych potrzeb pacjenta, pracując zarówno z dorosłymi, jak i młodzieżą.
                                </p>
                            </div>

                            <div className="grid md:grid-cols-2 gap-10 max-w-5xl mx-auto">
                                {/* Dorośli */}
                                <div className={`p-8 lg:p-10 rounded-[2rem] transition-colors duration-700 ${isDarkMode ? 'bg-stone-800' : 'bg-white shadow-xl shadow-stone-200/50'}`}>
                                    <h3 className="text-2xl font-medium mb-6">Dorośli</h3>
                                    <ul className="space-y-4">
                                        {[
                                            "Kryzysy życiowe i emocjonalne",
                                            "Trudności w relacjach z bliskimi",
                                            "Radzenie sobie ze stresem i wypaleniem",
                                            "Stany lękowe i obniżony nastrój",
                                            "Niskie poczucie własnej wartości"
                                        ].map((item, i) => (
                                            <li key={i} className={`flex items-start transition-colors duration-700 ${isDarkMode ? 'text-stone-300' : 'text-stone-600'}`}>
                                                <CheckCircle2 size={20} className={`mr-3 shrink-0 mt-0.5 transition-colors duration-700 ${isDarkMode ? 'text-stone-500' : 'text-stone-400'}`} />
                                                <span>{item}</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>

                                {/* Młodzież */}
                                <div className={`p-8 lg:p-10 rounded-[2rem] transition-colors duration-700 ${isDarkMode ? 'bg-stone-800' : 'bg-white shadow-xl shadow-stone-200/50'}`}>
                                    <h3 className="text-2xl font-medium mb-6">Młodzież</h3>
                                    <ul className="space-y-4">
                                        {[
                                            "Trudności emocjonalne okresu dojrzewania",
                                            "Problemy w relacjach rówieśniczych",
                                            "Budowanie pewności siebie",
                                            "Trudności szkolne i stres",
                                            "Wsparcie dla rodziców (psychoedukacja)"
                                        ].map((item, i) => (
                                            <li key={i} className={`flex items-start transition-colors duration-700 ${isDarkMode ? 'text-stone-300' : 'text-stone-600'}`}>
                                                <CheckCircle2 size={20} className={`mr-3 shrink-0 mt-0.5 transition-colors duration-700 ${isDarkMode ? 'text-stone-500' : 'text-stone-400'}`} />
                                                <span>{item}</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Sekcja Opinie */}
                    <section className={`py-16 lg:py-24 transition-colors duration-700 ${isDarkMode ? 'bg-stone-800/50' : 'bg-stone-100/50'}`}>
                        <div className="max-w-7xl mx-auto px-6 lg:px-8">
                            <div className="text-center mb-12">
                                <h2 className="text-3xl font-light mb-4">Co mówią pacjenci</h2>
                                <p className={`transition-colors duration-700 ${isDarkMode ? 'text-stone-400' : 'text-stone-500'}`}>Prawdziwe historie osób, które odnalazły wsparcie.</p>
                            </div>

                            <div className="grid md:grid-cols-2 gap-8 max-w-4xl mx-auto mb-12">
                                <div className={`p-8 rounded-3xl transition-colors duration-700 ${isDarkMode ? 'bg-stone-800' : 'bg-white shadow-sm'}`}>
                                    <Quote className={`mb-4 opacity-20 transition-colors duration-700 ${isDarkMode ? 'text-stone-100' : 'text-stone-900'}`} size={40} />
                                    <p className={`mb-6 italic transition-colors duration-700 ${isDarkMode ? 'text-stone-300' : 'text-stone-600'}`}>
                                        "Pani Katarzyna to osoba pełna empatii i ciepła. Od pierwszej wizyty czułam, że trafiłam w dobre ręce. Potrafi stworzyć atmosferę, w której człowiek czuje się w 100% bezpiecznie i swobodnie."
                                    </p>
                                    <p className="font-medium text-sm">— Pacjentka</p>
                                </div>
                                <div className={`p-8 rounded-3xl transition-colors duration-700 ${isDarkMode ? 'bg-stone-800' : 'bg-white shadow-sm'}`}>
                                    <Quote className={`mb-4 opacity-20 transition-colors duration-700 ${isDarkMode ? 'text-stone-100' : 'text-stone-900'}`} size={40} />
                                    <p className={`mb-6 italic transition-colors duration-700 ${isDarkMode ? 'text-stone-300' : 'text-stone-600'}`}>
                                        "Bardzo profesjonalne podejście. Pani psycholog uważnie słucha, nie ocenia, trafnie zadaje pytania, które skłaniają do własnych przemyśleń. Wizyty to dla mnie czas wyciszenia i zrozumienia."
                                    </p>
                                    <p className="font-medium text-sm">— Pacjent</p>
                                </div>
                            </div>

                            <div className="text-center">
                                <a
                                    href={bookingUrl}
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className={`inline-flex items-center font-medium underline-offset-4 hover:underline transition-all duration-700 ${isDarkMode ? 'text-stone-300 hover:text-white' : 'text-stone-600 hover:text-black'}`}
                                >
                                    Przeczytaj wszystkie opinie i sprawdź cennik na profilu ZnanyLekarz
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* Stopka */}
                    <footer className={`py-12 border-t transition-colors duration-700 ${isDarkMode ? 'bg-stone-900 border-stone-800' : 'bg-white border-stone-200'}`}>
                        <div className="max-w-7xl mx-auto px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="text-center md:text-left">
                                <span className="text-xl font-medium tracking-wide block mb-1">mgr Katarzyna Kryńska</span>
                                <span className={`text-sm transition-colors duration-700 ${isDarkMode ? 'text-stone-400' : 'text-stone-500'}`}>Psycholog</span>
                            </div>

                            <div className={`flex flex-col md:flex-row items-center gap-4 text-sm transition-colors duration-700 ${isDarkMode ? 'text-stone-400' : 'text-stone-600'}`}>
                                <a
                                    href="https://maps.app.goo.gl/E1KZ6GKsgfTTVg4C6"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="flex items-center no-underline text-inherit hover:text-inherit"
                                >
                                    <MapPin size={16} className="mr-2" />
                                    ul. Jana Pawła II 5, 83-010 Straszyn
                                </a>
                                <div className="hidden md:block w-1 h-1 rounded-full bg-stone-300"></div>
                                <div>Konsultacje Online</div>
                            </div>

                            <a
                                href={bookingUrl}
                                target="_blank"
                                rel="noopener noreferrer"
                                className={`px-6 py-3 rounded-full text-sm font-medium transition-colors duration-700 ${isDarkMode ? 'bg-stone-800 text-stone-200 hover:bg-stone-700' : 'bg-stone-100 text-stone-800 hover:bg-stone-200'}`}
                            >
                                Umów wizytę (ZnanyLekarz)
                            </a>
                        </div>
                    </footer>

                </div>
            );
        }

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
